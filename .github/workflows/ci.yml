name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RUST_VERSION: "1.95.0"
  INGEST_IMAGE_REPOSITORY: lumenhorizon/ingest-svc
  DB_MIGRATE_IMAGE_REPOSITORY: lumenhorizon/db-migrate
  PROCESSING_IMAGE_REPOSITORY: lumenhorizon/processing-svc
  API_GATEWAY_IMAGE_REPOSITORY: lumenhorizon/api-gateway

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://lumenhorizon:lumenhorizon@localhost:5432/lumenhorizon

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lumenhorizon
          POSTGRES_PASSWORD: lumenhorizon
          POSTGRES_DB: lumenhorizon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lumenhorizon -d lumenhorizon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        run: rustup toolchain install "${RUST_VERSION}" --profile minimal --component rustfmt --component clippy

      - name: Cache Cargo artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: cargo-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: backend

      - name: Check workspace
        run: cargo check
        working-directory: backend

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: backend

      - name: Validate OpenAPI contract
        run: cargo test -p api-gateway openapi_contract_covers_gateway_api_routes
        working-directory: backend

      - name: Test workspace
        run: cargo test --workspace
        working-directory: backend

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build ingest image
        id: build-ingest
        run: |
          image_ref="${INGEST_IMAGE_REPOSITORY}:${GITHUB_SHA}"
          docker build \
            --pull \
            --build-arg RUST_VERSION="${RUST_VERSION}" \
            -f backend/ingest-svc/Dockerfile \
            -t "${image_ref}" \
            .
          echo "image-ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Build db-migrate image
        id: build-db-migrate
        run: |
          image_ref="${DB_MIGRATE_IMAGE_REPOSITORY}:${GITHUB_SHA}"
          docker build \
            --pull \
            --build-arg RUST_VERSION="${RUST_VERSION}" \
            -f backend/db-migrate/Dockerfile \
            -t "${image_ref}" \
            .
          echo "image-ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Build processing image
        id: build-processing
        run: |
          image_ref="${PROCESSING_IMAGE_REPOSITORY}:${GITHUB_SHA}"
          docker build \
            --pull \
            --build-arg RUST_VERSION="${RUST_VERSION}" \
            -f backend/processing-svc/Dockerfile \
            -t "${image_ref}" \
            .
          echo "image-ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Build API Gateway image
        id: build-api-gateway
        run: |
          image_ref="${API_GATEWAY_IMAGE_REPOSITORY}:${GITHUB_SHA}"
          docker build \
            --pull \
            --build-arg RUST_VERSION="${RUST_VERSION}" \
            -f backend/api-gateway/Dockerfile \
            -t "${image_ref}" \
            .
          echo "image-ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Scan ingest image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build-ingest.outputs.image-ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Scan db-migrate image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build-db-migrate.outputs.image-ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Scan processing image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build-processing.outputs.image-ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Scan API Gateway image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build-api-gateway.outputs.image-ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
